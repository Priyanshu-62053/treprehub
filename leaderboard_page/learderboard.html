<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- Heading -->
<div class="top-heading">
<h1>🏆 Top 10 Rankers</h1>
<!-- <h2>Coming Soon</h2> -->
<hr>
<h4>BPSC TRE Mock Test Leaderboard</h4>
</div>

<h2 class="coming-soon">In Process...</h2>
<p class="coming-soon">Soon you'll be able to see top scorers and compete with others. Keep practicing to climb the ranks!</p>
<!-- Leaderboard -->
<div class="rankers-card">

<!-- Header -->
<div class="rankers header">
<div>Name</div>
<div>Score</div>
<div>Percentage</div>
<div>Time</div>
</div>

<hr>

<div id="leaderboard-container"></div>

</div>


<!-- Buttons -->
<div class="btn">
<button id="backTotest">⬅️ Back To Test</button>
<button id="ViewResult">View My Result ➡️</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
